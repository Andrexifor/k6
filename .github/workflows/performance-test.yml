on:
  push:
    branches: [rama_01]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: "performance-test-app"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          use_docker: true